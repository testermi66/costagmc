<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор потерь | ФЕ 110</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d9e6d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px 24px 40px 24px;
        }

        .calculator {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .columns {
            display: flex;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            min-width: 280px;
            padding: 28px 24px;
            background: white;
        }

        .loss-panel {
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f0f7ec;
            margin: 24px 0;
            border-radius: 12px;
            text-align: center;
            gap: 12px;
        }

        @media (max-width: 800px) {
            .columns {
                flex-direction: column;
            }
            .loss-panel {
                width: auto;
                flex-direction: row;
                margin: 0 20px 20px 20px;
                padding: 16px;
                gap: 20px;
            }
        }

        .area-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #e2efdb;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .area-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2d4a1e;
        }

        .area-value {
            font-size: 1.7rem;
            font-weight: 800;
            background: #eaf5e4;
            padding: 4px 14px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: #2b6e2f;
        }

        .area-unit {
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 4px;
            color: #5a7c4a;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #4a6b3a;
            margin: 16px 0 10px 0;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }

        .option-btn {
            background: #f1f8ed;
            border: 1px solid #cde2c4;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 6px;
            color: #2d4a1e;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }

        .option-btn.active {
            background: #3c8c40;
            color: white;
            border-color: #2d6e2f;
        }

        .option-btn:hover {
            background: #e2f0db;
        }

        .product-btn {
            background: #2d6e2f;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            margin-bottom: 16px;
            width: 100%;
            text-align: center;
        }

        .product-btn:hover {
            background: #235a25;
        }

        .info-chip {
            background: #f4faef;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2b6e2f;
            border-left: 3px solid #3c8c40;
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
            margin-top: 8px;
        }

        .loss-badge {
            font-size: 2.4rem;
            font-weight: 800;
            font-family: monospace;
            background: #2d5a2a;
            color: #e3ffcf;
            padding: 6px 18px;
            border-radius: 12px;
            min-width: 140px;
        }

        .loss-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #3c6e2f;
        }

        footer {
            background: #eef5ea;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #527a42;
            border-top: 1px solid #d4e6cb;
        }

        .note {
            font-size: 0.7rem;
            color: #6b8c5c;
            margin-top: 12px;
            text-align: center;
            border-top: 1px solid #e2efdb;
            padding-top: 12px;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="columns">
        <!-- ЛЕВАЯ КОЛОНКА: ВХОД -->
        <div class="panel">
            <div class="area-header">
                <span class="area-title">📥 Вход</span>
                <span class="area-value" id="inputArea">0.000<span class="area-unit">м²</span></span>
            </div>
            
            <button class="product-btn" id="productBtn">ФЕ 110</button>
            
            <div class="section-label">ГАБАРИТЫ (Ш × Д)</div>
            <div class="button-group" id="inputSizeGroup"></div>
            <div class="info-chip" id="inputInfo"></div>
        </div>

        <!-- ЦЕНТР: ПРОЦЕНТ ПОТЕРЬ -->
        <div class="loss-panel">
            <div class="loss-badge" id="lossPercent">0.00%</div>
            <div class="loss-label">📉 потери материала</div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: ВЫХОД (множитель) -->
        <div class="panel">
            <div class="area-header">
                <span class="area-title">📤 Выход</span>
                <span class="area-value" id="outputArea">0.000<span class="area-unit">м²</span></span>
            </div>
            <div class="section-label">КОЛИЧЕСТВО (множитель)</div>
            <div class="button-group" id="multiplierGroup"></div>
            <div class="info-chip" id="outputInfo">базовая деталь: 0.515 м × 0.110 м</div>
        </div>
    </div>
    <footer>
        Потери = (1 – (S_детали × множитель) / S_входа) × 100%
        <div class="note">⚡ Размер и множитель связаны: при выборе любого параметра второй меняется автоматически</div>
    </footer>
</div>

<script>
    // -------- ШИРИНА ФИКСИРОВАНА: 0.119 м --------
    const FIXED_WIDTH = 0.119;
    
    // ВХОД: список доступных длин в метрах и соответствующий множитель
    const INPUT_ITEMS = [
        { length: 0.665, defaultMultiplier: 1, display: "0.119×0.665" },
        { length: 1.515, defaultMultiplier: 2, display: "0.119×1.515" },
        { length: 1.830, defaultMultiplier: 3, display: "0.119×1.830" },
        { length: 2.410, defaultMultiplier: 4, display: "0.119×2.410" }
    ];
    
    // ВЫХОД: фиксированный размер детали (0.515 × 0.11) в метрах
    const OUTPUT_SIZE = { width: 0.515, length: 0.110 };
    
    // Текущее состояние
    let currentInputIndex = 0;
    let currentMultiplier = 1;
    
    const inputAreaSpan = document.getElementById('inputArea');
    const outputAreaSpan = document.getElementById('outputArea');
    const lossSpan = document.getElementById('lossPercent');
    const inputInfoDiv = document.getElementById('inputInfo');
    const outputInfoDiv = document.getElementById('outputInfo');
    const inputSizeGroup = document.getElementById('inputSizeGroup');
    const multiplierGroup = document.getElementById('multiplierGroup');
    const productBtn = document.getElementById('productBtn');
    
    function update() {
        const currentItem = INPUT_ITEMS[currentInputIndex];
        const inputSquare = FIXED_WIDTH * currentItem.length;
        
        const singleOutputSquare = OUTPUT_SIZE.width * OUTPUT_SIZE.length;
        const totalOutputSquare = singleOutputSquare * currentMultiplier;
        
        inputAreaSpan.innerHTML = `${inputSquare.toFixed(6)}<span class="area-unit">м²</span>`;
        outputAreaSpan.innerHTML = `${totalOutputSquare.toFixed(6)}<span class="area-unit">м²</span>`;
        
        let loss = 0;
        if (inputSquare > 0) {
            loss = (1 - totalOutputSquare / inputSquare) * 100;
        }
        lossSpan.innerHTML = `${loss.toFixed(2)}%`;
        
        inputInfoDiv.innerHTML = `${FIXED_WIDTH.toFixed(3)} м × ${currentItem.length.toFixed(3)} м`;
        outputInfoDiv.innerHTML = `база: ${OUTPUT_SIZE.width.toFixed(3)} м × ${OUTPUT_SIZE.length.toFixed(3)} м  |  ×${currentMultiplier}`;
    }
    
    // Обновить активные классы у кнопок входа
    function updateInputButtonsActive() {
        const btns = inputSizeGroup.querySelectorAll('.option-btn');
        btns.forEach((btn, idx) => {
            if (idx === currentInputIndex) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    // Обновить активные классы у кнопок множителя
    function updateMultiplierButtonsActive() {
        const btns = multiplierGroup.querySelectorAll('.option-btn');
        btns.forEach((btn) => {
            const val = parseInt(btn.textContent.replace('×', ''));
            if (val === currentMultiplier) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    // Отрисовка кнопок выбора размера входа
    function renderInputOptions() {
        inputSizeGroup.innerHTML = '';
        INPUT_ITEMS.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            if (idx === currentInputIndex) btn.classList.add('active');
            btn.textContent = item.display;
            btn.addEventListener('click', () => {
                currentInputIndex = idx;
                currentMultiplier = item.defaultMultiplier;
                renderInputOptions();
                renderMultiplierOptions();  // перерисуем множители с новым active
                update();
            });
            inputSizeGroup.appendChild(btn);
        });
    }
    
    // Отрисовка кнопок множителя (с взаимной привязкой)
    function renderMultiplierOptions() {
        multiplierGroup.innerHTML = '';
        const multipliers = [1, 2, 3, 4];
        multipliers.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            if (m === currentMultiplier) btn.classList.add('active');
            btn.textContent = `×${m}`;
            btn.addEventListener('click', () => {
                currentMultiplier = m;
                // Ищем размер входа, у которого defaultMultiplier === m
                const foundIndex = INPUT_ITEMS.findIndex(item => item.defaultMultiplier === m);
                if (foundIndex !== -1) {
                    currentInputIndex = foundIndex;
                }
                renderMultiplierOptions();
                renderInputOptions();  // перерисуем размеры с новым active
                update();
            });
            multiplierGroup.appendChild(btn);
        });
    }
    
    // Кнопка ФЕ 110 — сброс к первому размеру и множителю ×1
    productBtn.addEventListener('click', () => {
        currentInputIndex = 0;
        currentMultiplier = INPUT_ITEMS[0].defaultMultiplier;
        renderInputOptions();
        renderMultiplierOptions();
        update();
    });
    
    // Инициализация
    renderInputOptions();
    renderMultiplierOptions();
    update();
</script>
</body>
</html>
